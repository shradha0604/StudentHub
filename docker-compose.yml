services:
  backend:
    build:
      context: ./backend

    container_name: studenthub-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend/data:/data

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000

    container_name: studenthub-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend

    restart: unless-stopped